# Identidad visual Actuarial Cortex — Logos y colores actuariales
# Usado por la web y los PDFs del libro/revista

meta:
  name: "Actuarial Cortex"

logo:
  images:
    header: "logo-AC/logo-ac-blanco.png"
    white: logo-AC/logo-ac-blanco.png
  medium: header
  large: white

color:
