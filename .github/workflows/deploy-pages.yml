# Build con R + Quarto y despliegue a Cloudflare Pages.
# Requiere secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# En Cloudflare Pages puedes desactivar el build por Git y usar solo este workflow.
name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Install R dependencies
        run: |
          R -e 'install.packages(c("knitr", "rmarkdown", "xml2"), repos = "https://cloud.r-project.org")'

      - name: Install Quarto
        run: |
          curl -sL -o quarto.deb "https://github.com/quarto-dev/quarto-cli/releases/download/v1.7.33/quarto-1.7.33-linux-amd64.deb"
          sudo dpkg -i quarto.deb

      - name: Render site (HTML, with R execution)
        run: quarto render --to html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
